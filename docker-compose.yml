services:
  postgres:
    image: postgres:16
    container_name: abiel-postgres
    restart: always
    environment:
      POSTGRES_USER: abiel
      POSTGRES_PASSWORD: abiel
      POSTGRES_DB: abiel
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U abiel"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      args:
        DATABASE_URL: ${DATABASE_URL}
    container_name: abiel-backend-app
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      NODE_ENV: development
      HOST: 0.0.0.0
      PORT: 5000
      DATABASE_URL: ${DATABASE_URL}
    ports:
      - "5000:5000"
    command: ["npm", "start"]

volumes:
  postgres_data:
